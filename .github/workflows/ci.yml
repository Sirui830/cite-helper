name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: |
          python -c "from cite_helper.cli import main; from cite_helper.indexer import build_from_pdf_folder; from cite_helper.retriever import Index; from cite_helper.chunker import chunk_sections; print('imports OK')"

      - name: CLI help works
        run: |
          cite-helper --help
          cite-helper build --help
          cite-helper find --help
          cite-helper verify --help
          cite-helper stats --help

# Note: regression tests require a built index (large model + PDFs).
# Run them locally before pushing. Future work: add a tiny fixture index.
